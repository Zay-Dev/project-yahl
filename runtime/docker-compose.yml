services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  agent:
    build:
      context: ..
      dockerfile: runtime/Dockerfile.agent
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../workspace:/root
      - ./agent/Agent.md:/opt/agent/Agent.md:ro
      - ./orchestrator/YAHL:/opt/yahl:ro
      - ./orchestrator/SKILLS:/opt/skills:ro
    command: ["pnpm", "--silent", "--filter", "runtime", "run", "agent", "--", "--daemon"]
