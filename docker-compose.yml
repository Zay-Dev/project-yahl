services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  onecli:
    image: ghcr.io/onecli/onecli:latest
    depends_on:
      onecli_postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://onecli:onecli@onecli_postgres:5432/onecli
    ports:
      - "10254:10254"
      - "10255:10255"
    volumes:
      - onecli_data:/app/data

  onecli_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onecli
      POSTGRES_PASSWORD: onecli
      POSTGRES_USER: onecli
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecli -d onecli"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - onecli_postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    working_dir: /app
    command: sh -lc "pnpm install --config.confirmModulesPurge=false && pnpm --filter server run dev"
    env_file:
      - .env
    environment:
      CI: "true"
      MONGODB_URI: mongodb://mongo:27017/yahl
      REDIS_URL: redis://redis:6379
      RUNTIME_REPO_ROOT: ${HOST_REPO_ROOT}
      RUNTIME_SHARED_NETWORK: yahl_shared
      YAHL_ENABLE_ASK_USER: ${YAHL_ENABLE_ASK_USER:-false}
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./:/app
      - ${HOST_REPO_ROOT}:${HOST_REPO_ROOT}
      - /var/run/docker.sock:/var/run/docker.sock
      - server_node_modules:/app/node_modules

  web:
    image: node:22
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install --config.confirmModulesPurge=false && pnpm --filter web dev --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    environment:
      CI: "true"
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules

volumes:
  onecli_data:
  onecli_postgres_data:
  server_node_modules:
  web_node_modules:

networks:
  default:
    name: yahl_shared