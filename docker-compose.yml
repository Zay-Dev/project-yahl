services:
  mongo:
    image: mongo:7
    # ports:
    #   - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

  server:
    image: node:22
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install --config.confirmModulesPurge=false && pnpm --filter server run dev"
    env_file:
      - .env
    environment:
      CI: "true"
      MONGODB_URI: mongodb://mongo:27017/yahl
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    volumes:
      - ./:/app
      - server_node_modules:/app/node_modules

  web:
    image: node:22
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install --config.confirmModulesPurge=false && pnpm --filter web dev --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    environment:
      CI: "true"
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules

volumes:
  server_node_modules:
  web_node_modules: